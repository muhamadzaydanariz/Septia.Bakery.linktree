<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Septia Bakery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500;1,9..144,600&family=DM+Sans:wght@400;500;700&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:   #FBF1E1;
    --cream2:  #F2E1BE;
    --paper:   #FFFDF8;
    --maroon:  #7A2222;
    --maroon-d:#571414;
    --gold:    #C89440;
    --gold-lt: #E4C685;
    --ink:     #3A2415;
    --ink-dim: #7c624a;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    min-height: 100%;
    background:
      radial-gradient(ellipse 90% 60% at 50% 0%, var(--cream2) 0%, var(--cream) 55%);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    justify-content: center;
    padding: 44px 20px 40px;
    position: relative;
    overflow-x: hidden;
  }

  /* subtle wheat-grain texture */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image: repeating-linear-gradient(
      115deg,
      rgba(122,34,34,0.025) 0px,
      rgba(122,34,34,0.025) 1px,
      transparent 1px,
      transparent 14px
    );
    pointer-events: none;
  }

  .page {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }

  /* ---- Logo ---- */
  .logo-wrap {
    position: relative;
    width: 172px;
    height: 172px;
    margin-bottom: 6px;
  }
  .logo-glow {
    position: absolute;
    inset: -22px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(200,148,64,0.35) 0%, rgba(200,148,64,0) 70%);
    filter: blur(2px);
  }
  .logo-wrap img {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    box-shadow:
      0 0 0 4px var(--paper),
      0 0 0 5px var(--gold),
      0 14px 30px rgba(87,20,20,0.28);
    animation: settle .7s cubic-bezier(.2,.9,.3,1.2);
  }
  @keyframes settle {
    from { opacity: 0; transform: scale(.9) translateY(8px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* ---- Tagline ---- */
  .tagline-main {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 1.32rem;
    color: var(--maroon-d);
    text-align: center;
    line-height: 1.35;
    margin: 18px 0 10px;
    max-width: 300px;
  }

  .stamp {
    font-family: 'Space Mono', monospace;
    font-size: 0.66rem;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--maroon);
    background: var(--gold-lt);
    border: 1px solid var(--gold);
    border-radius: 999px;
    padding: 5px 16px;
    margin-bottom: 30px;
  }

  /* ---- Link tags ---- */
  .tags {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .tag {
    position: relative;
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--paper);
    color: var(--ink);
    text-decoration: none;
    padding: 14px 18px 14px 14px;
    border-radius: 14px;
    border: 1.5px solid rgba(122,34,34,0.14);
    box-shadow: 0 2px 0 rgba(122,34,34,0.08), 0 8px 18px rgba(87,20,20,0.10);
    transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
  }

  .tag:hover, .tag:focus-visible {
    transform: translateY(-3px);
    box-shadow: 0 4px 0 rgba(122,34,34,0.12), 0 14px 26px rgba(87,20,20,0.18);
    border-color: var(--gold);
  }
  .tag:focus-visible {
    outline: 2px solid var(--maroon);
    outline-offset: 3px;
  }

  .tag-icon {
    flex: none;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(155deg, var(--gold-lt), var(--gold));
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: inset 0 0 0 1.5px rgba(122,34,34,0.25);
  }
  .tag-icon svg { width: 21px; height: 21px; fill: var(--maroon-d); }

  .tag-text { display: flex; flex-direction: column; min-width: 0; flex: 1; }
  .tag-label {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 1.05rem;
    line-height: 1.2;
    color: var(--maroon-d);
  }
  .tag-sub {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    color: var(--ink-dim);
    margin-top: 2px;
  }

  .tag-arrow {
    flex: none;
    width: 16px;
    height: 16px;
    opacity: .35;
    transition: transform .2s ease, opacity .2s ease;
  }
  .tag:hover .tag-arrow { transform: translateX(3px); opacity: .7; }

  /* ---- Footer / address ---- */
  footer {
    margin-top: 38px;
    display: flex;
    align-items: flex-start;
    gap: 6px;
    max-width: 300px;
    text-align: center;
  }
  .addr {
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.03em;
    line-height: 1.6;
    color: var(--ink-dim);
  }
  .addr b {
    display: block;
    color: var(--maroon);
    letter-spacing: 0.14em;
    margin-bottom: 3px;
  }

  .divider {
    width: 100%;
    max-width: 300px;
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 34px 0 6px;
    color: var(--gold);
  }
  .divider svg { flex: none; width: 14px; height: 14px; fill: var(--gold); }
  .divider .line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
</style>
</head>
